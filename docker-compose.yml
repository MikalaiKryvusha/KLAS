# Сервис anythingllm закомментирован при миграции в KLAS (остался в F:\LOCAL_NOMAD)
services:
  # Ваш существующий блок Kiwix
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve
    container_name: kiwix_wikipedia
    volumes:
      - "F:/KLAS/KiwixDB/:/data"
    ports:
      # host-порт 8081: порт 8080 хоста закреплён за llama-server (баг 01 — конфликт портов).
      # Внутри docker-сети kiwix остаётся на 8080 — Caddy проксирует на kiwix_wikipedia:8080.
      - "8081:8080"
    command: "--urlRoot /wiki/ *.zim"
    restart: unless-stopped

  # Ваш существующий блок AnythingLLM
#   anythingllm:
#     image: mintplexlabs/anythingllm
#     container_name: anythingllm
#     ports:
#       - "3001:3001"
#     cap_add:
#       - SYS_ADMIN
#     volumes:
#       - "F:/KLAS/AnythingLLM/storage:/app/server/storage"
#       - "F:/KLAS/AnythingLLM/data:/app/server/data"
#     restart: unless-stopped
#     environment:
#       - STORAGE_DIR=/app/server/storage

  # НОВЫЙ блок Homepage (исправленный)
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - "3005:3000"
    volumes:
      - "F:/KLAS/homepage/config:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - HOMEPAGE_VAR_BASE_URL=/homepage
      - HOMEPAGE_ALLOWED_HOSTS=localhost:3005,127.0.0.1:3005,krinikspc.forest-ratio.ts.net
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "F:/KLAS/caddy/Caddyfile:/etc/caddy/Caddyfile"
      - "F:/KLAS/caddy/data:/data"
      - "F:/KLAS/caddy/config:/config"

