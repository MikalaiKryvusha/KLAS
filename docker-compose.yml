# Сервис anythingllm закомментирован при миграции в KLAS (остался в F:\LOCAL_NOMAD)
services:
  # Ваш существующий блок Kiwix
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve
    container_name: kiwix_wikipedia
    volumes:
      - "F:/KLAS/KiwixDB/:/data"
    ports:
      # host-порт 8081: порт 8080 хоста закреплён за llama-server (баг 01 — конфликт портов).
      # Внутри docker-сети kiwix остаётся на 8080 — Caddy проксирует на kiwix_wikipedia:8080.
      - "8081:8080"
    command: "--urlRoot /wiki/ *.zim"
    restart: unless-stopped

  # Ваш существующий блок AnythingLLM
#   anythingllm:
#     image: mintplexlabs/anythingllm
#     container_name: anythingllm
#     ports:
#       - "3001:3001"
#     cap_add:
#       - SYS_ADMIN
#     volumes:
#       - "F:/KLAS/AnythingLLM/storage:/app/server/storage"
#       - "F:/KLAS/AnythingLLM/data:/app/server/data"
#     restart: unless-stopped
#     environment:
#       - STORAGE_DIR=/app/server/storage

  # Open WebUI — гостевой ChatGPT-подобный чат для родных (идея 09): личные аккаунты + авторизация
  # (приватные чаты у каждого), подключён к нашему LLM через OpenAI-API llama-swap на хосте.
  # llama-swap на host:8080 (прямой доступ, без auth — авторизацию пользователей держит сам Open WebUI).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3080:8080"
    volumes:
      - "F:/KLAS/open-webui/data:/app/backend/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8080/v1
      - OPENAI_API_KEY=klas-local            # llama-swap на :8080 без auth — ключ формальный
      - ENABLE_OLLAMA_API=false              # используем только OpenAI-совместимый бэкенд (llama-swap)
      - WEBUI_AUTH=true                      # личные аккаунты + логин (родные не видят чужие чаты)
      - WEBUI_NAME=KLAS Chat
    restart: unless-stopped

  # НОВЫЙ блок Homepage (исправленный)
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - "3005:3000"
    volumes:
      - "F:/KLAS/homepage/config:/app/config"
      - "/var/run/docker.sock:/var/run/docker.sock"
      # favicon пульта — векторный Кот Криник (подмена дефолтных иконок homepage)
      - "F:/KLAS/logo/favicon-32x32.png:/app/public/favicon-32x32.png"
      - "F:/KLAS/logo/favicon-16x16.png:/app/public/favicon-16x16.png"
      - "F:/KLAS/logo/apple-touch-icon.png:/app/public/apple-touch-icon.png"
      - "F:/KLAS/logo/homepage.ico:/app/public/homepage.ico"
      # PWA-иконки (Chrome «Установить приложение» берёт их из site.webmanifest)
      - "F:/KLAS/logo/android-chrome-192x192.png:/app/public/android-chrome-192x192.png"
      - "F:/KLAS/logo/android-chrome-512x512.png:/app/public/android-chrome-512x512.png"
    environment:
      # base НЕ задаём — пульт смонтирован на КОРНЕ за Caddy/funnel (баг 02); homepage корневой.
      - HOMEPAGE_ALLOWED_HOSTS=localhost:3005,127.0.0.1:3005,krinikspc.forest-ratio.ts.net
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "F:/KLAS/caddy/Caddyfile:/etc/caddy/Caddyfile"
      - "F:/KLAS/caddy/data:/data"
      - "F:/KLAS/caddy/config:/config"

