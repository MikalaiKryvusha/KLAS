# llama-swap — менеджер «спит, пока не позовут» для LLM-серверов KLAS (Фаза 4).
# Слушает 127.0.0.1:8080 (тот же порт, что раньше держал llama-server напрямую, — Zoo Code и
# другие OpenAI-клиенты работают без изменений). По полю `model` запроса llama-swap сам
# запускает нужный llama-server (порт ${PORT} назначает автоматически) и выгружает его после
# простоя ttl секунд — VRAM свободна, пока ИИ не позвали.
#
# Запуск:   llama-swap -config F:\KLAS\llama-swap\config.yaml -listen 127.0.0.1:8080
# Проверка: powershell -File F:\KLAS\tools\health-check.ps1 | веб-UI: http://127.0.0.1:8080/ui/
#
# Все контексты выставлены под приоритет владельца (идея 07): БОЛЬШЕ ПАМЯТИ. KV-кеш квантуется в
# q8_0 (безопасно для агентики, researches/02) — это ~2x к вместимости контекста. Каждый профиль
# проверен на влезаемость в 16 ГБ VRAM (замеры 2026-07-03) — стабильность важнее скорости/контекста.
# thinking отключён везде (--chat-template-kwargs): агентским клиентам нужен чистый ответ, а не
# «размышления» в поле reasoning_content (иначе при малом max_tokens ответ приходит пустым).

models:
  # ⭐ Qwythos-9B (Claude-Mythos-5), обучена на контекст 1M. РЕКОМЕНДУЕТСЯ КАК ОСНОВНАЯ (идея 07):
  # 256K контекста стабильно (VRAM 12.7 ГБ), agent-bench 6/6, needle на 148K ✅, генерация ~67-98 t/s.
  # Прямой ответ на «не хватает памяти»: окно в 2.6x больше qwen3.5. (1M не влезает: KV на 1M токенов
  # физически больше 16 ГБ VRAM; 256K — безопасный максимум с запасом.)
  "qwythos-9b":
    cmd: >
      F:\KLAS\llamacpp\llama-server.exe
      -m F:\KLAS\LLMs\LLAMACPP_MODELS\Qwythos-9B-Claude-Mythos-5-1M-Q5_K_M.gguf
      --port ${PORT} -c 262144 -ctk q8_0 -ctv q8_0
      -ngl 99 --flash-attn on -b 2048 -ub 1024 --jinja
      -np 1 --slots --cont-batching
      --chat-template-kwargs "{\"enable_thinking\": false}"
    ttl: 300

  # Бывшая основная (фев→июль 2026) → FALLBACK до конца обкатки 3.6 (интервью 006 Q2=A), потом
  # судьба решается отдельно. Цепочки в OpenClaw 5/6 (флейк write ~9%, peg-баг llama.cpp #20260 —
  # research 09 §3.4). Сэмплинг Qwen non-thinking (дефолт сервера провоцировал текст перед <tool_call>).
  "qwen3.5-35b":
    cmd: >
      F:\KLAS\llamacpp\llama-server.exe
      -m F:\KLAS\LLMs\LLAMACPP_MODELS\Qwen3.5-35B-A3B-UD-IQ3_S.gguf
      --port ${PORT} -c 98304 -ctk q8_0 -ctv q8_0
      -ngl 99 --flash-attn on -b 2048 -ub 1024 --jinja
      -np 1 --slots --cont-batching
      --temperature 0.7 --top-p 0.8 --top-k 20 --min-p 0
      --chat-template-kwargs "{\"enable_thinking\": false}"
    ttl: 300

  # ⭐ ОСНОВНАЯ модель KLAS (интервью 006, 2026-07-17): преемник qwen3.5 — та же формула MoE A3B,
  # поколение 3.6 (апрель). Ум = 3.5 (v3 6.7), но ЦЕПОЧКИ В ЦИКЛЕ ЯДРА OpenClaw чище всех:
  # 6/6 + format-hold 5/5 без флейков (у 3.5 был остаточный ~9% на peg-баге llama.cpp #20260).
  # Speed: pp 3997 / tg 164 t/s, 12.73 GiB. Сэмплинг по рекомендации Qwen (non-thinking).
  # Алиас -r = второе имя ТОГО ЖЕ инстанса: fallback №1 в OpenClaw → ретрай той же модели при 500.
  "qwen3.6-35b-a3b":
    cmd: >
      F:\KLAS\llamacpp\llama-server.exe
      -m F:\KLAS\LLMs\LLAMACPP_MODELS\Qwen3.6-35B-A3B-UD-IQ3_S.gguf
      --port ${PORT} -c 98304 -ctk q8_0 -ctv q8_0
      -ngl 99 --flash-attn on -b 2048 -ub 1024 --jinja
      -np 1 --slots --cont-batching
      --temperature 0.7 --top-p 0.8 --top-k 20 --min-p 0
      --chat-template-kwargs "{\"enable_thinking\": false}"
    aliases:
      - "qwen3.6-35b-a3b-r"
    ttl: 300

  # Плотная 27B IQ3_XXS. Контекст поднят 32768 → 65536 (KV q8_0, VRAM 14.9) — ФИКС ошибки 400 из
  # Zoo Code (запрос 53854 токенов больше не падает). Медленная (52 t/s), квант на нижней границе.
  "qwen3.6-27b":
    cmd: >
      F:\KLAS\llamacpp\llama-server.exe
      -m F:\KLAS\LLMs\LLAMACPP_MODELS\Qwen3.6-27B-UD-IQ3_XXS.gguf
      --port ${PORT} -c 65536 -ctk q8_0 -ctv q8_0
      -ngl 99 --flash-attn on -b 2048 -ub 1024 --jinja
      -np 1 --slots --cont-batching
      --chat-template-kwargs "{\"enable_thinking\": false}"
    ttl: 300

  # Ornith-1.0-35B (MoE A3B, SWE-bench 75.6): умная, генерация быстрая (117 t/s), НО медленный
  # prompt-processing (needle-16K ~214 с) → для коротких задач/чата, не для длинных агентных промптов.
  # ctx 49152 (KV q8_0) — запас VRAM. Кандидат «ум», добавлен по идее 08.
  "ornith-35b":
    cmd: >
      F:\KLAS\llamacpp\llama-server.exe
      -m F:\KLAS\LLMs\LLAMACPP_MODELS\Ornith-1.0-35B-IQ3_XXS.gguf
      --port ${PORT} -c 49152 -ctk q8_0 -ctv q8_0
      -ngl 99 --flash-attn on -b 2048 -ub 1024 --jinja
      -np 1 --slots --cont-batching
      --chat-template-kwargs "{\"enable_thinking\": false}"
    ttl: 300

  # gpt-oss-20b — отбенчен и ОТСЕЯН (интервью 006 Q3, 2026-07-17): скорость-рекорд (252 t/s), но ум
  # 5.7/8 < критерия владельца «сопоставим с gemma (7.5) или лучше». Квант удалён; вернуть при
  # нужде: node tools/try-model.mjs unsloth/gpt-oss-20b-GGUF gpt-oss-20b-UD-Q4_K_XL.gguf
  # (+ проф. настройка: --chat-template-kwargs reasoning_effort=low — иначе reasoning ест max_tokens).

  # gemma-4-12b: запасная + мультимодальная (зрение — задел под Jarvis, идея 05). Контекст 131K.
  # ⚠️ Владелец (2026-07-17): «гемма какая-то болезненная» — подтверждается данными: в чужом
  # агентном цикле (OpenClaw) обрывает цепочки (3/6), жёсткий анти-репит сэмплинг ниже. В цепочках
  # ядра НЕ использовать (research 09 §3.4); сильна как одноходовый агент в НАШЕМ цикле (v3 7.5).
  "gemma-4-12b":
    cmd: >
      F:\KLAS\llamacpp\llama-server.exe
      -m F:\KLAS\LLMs\LLAMACPP_MODELS\gemma-4-12b-it-UD-Q4_K_XL.gguf
      --port ${PORT} -c 131072 -ngl 99 --flash-attn on -b 2048 -ub 1024 --jinja
      -np 1 --slots --cont-batching
      --temperature 0.6 --min-p 0.05 --repeat-penalty 1.2 --repeat-last-n 512
      --frequency-penalty 0.15 --presence-penalty 0.2 --reasoning off --cache-ram 0
    ttl: 300
