<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- KLAS favicon — Кот Криник. Порядок слоёв: уши рисуются ПЕРВЫМИ, голова поверх перекрывает их
       основание → уши прорастают из головы без щели (посажены низко, базы уходят под голову).
       Без полосок на лбу и без рта-волн; только прямые толстые вибриссы (по 2 справа/слева),
       переживающие растеризацию в 16/32px. Глаза голубо-серые. -->
  <rect width="64" height="64" rx="14" fill="#2b2440"/>

  <!-- уши (посажены ниже; основание широко уходит под голову — голова накроет и сошьёт без зазора) -->
  <path d="M13 36 L18 8 L31 28 Z" fill="#8a8a92"/>
  <path d="M51 36 L46 8 L33 28 Z" fill="#8a8a92"/>
  <path d="M18 31 L19 13 L27 26 Z" fill="#f4a9b8"/>
  <path d="M46 31 L45 13 L37 26 Z" fill="#f4a9b8"/>

  <!-- голова (поверх оснований ушей) -->
  <ellipse cx="32" cy="38" rx="21" ry="19" fill="#9a9aa2"/>
  <!-- морда (светлее) -->
  <ellipse cx="32" cy="42" rx="16" ry="13" fill="#e8e8ec"/>

  <!-- глаза (голубо-серые, смышлёные) -->
  <ellipse cx="24" cy="36" rx="5.4" ry="6.2" fill="#fff"/>
  <ellipse cx="40" cy="36" rx="5.4" ry="6.2" fill="#fff"/>
  <circle cx="24.5" cy="37" r="3.4" fill="#7f9cbb"/>
  <circle cx="39.5" cy="37" r="3.4" fill="#7f9cbb"/>
  <circle cx="24.5" cy="37" r="1.7" fill="#3a4658"/>
  <circle cx="39.5" cy="37" r="1.7" fill="#3a4658"/>
  <circle cx="25.6" cy="35.8" r="1.1" fill="#fff"/>
  <circle cx="40.6" cy="35.8" r="1.1" fill="#fff"/>

  <!-- нос + маленький ротик-улыбка -->
  <path d="M29.5 44 L34.5 44 L32 47.5 Z" fill="#e26d8a"/>
  <path d="M32 47.5 q-2.4 2 -4.6 0.7 M32 47.5 q2.4 2 4.6 0.7" stroke="#3a3a40" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- вибриссы — по 2 справа и слева, прямые, тёмные, тонкие -->
  <g stroke="#1c1c1e" stroke-width="1.6" stroke-linecap="round">
    <path d="M21 42 L5 39"/>
    <path d="M21 46 L6 49"/>
    <path d="M43 42 L59 39"/>
    <path d="M43 46 L58 49"/>
  </g>
</svg>
